<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Gallery</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Background */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Title */
        .title {
            margin-bottom: 20px;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Card */
        .card {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        /* Image */
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease, filter 0.5s ease;
        }

        /* Overlay */
        .overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            color: white;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Hover */
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card:hover img {
            transform: scale(1.1);
            filter: brightness(70%);
        }

        .card:hover .overlay {
            opacity: 1;
        }
    </style>

</head>

<body>

    <h1 class="title">Nature Gallery</h1>

    <div class="gallery">
        <div class="card">
            <img src="https://picsum.photos/id/1018/400/300" alt="Farm Sunset">
            <div class="overlay">Sunset Farm</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1015/400/300" alt="Waterfall">
            <div class="overlay">Hidden Waterfall</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1025/400/300" alt="Flower">
            <div class="overlay">Colorful Flower</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1016/400/300" alt="Ocean">
            <div class="overlay">Ocean Waves</div>
        </div>
    </div>

</body>
</html>
